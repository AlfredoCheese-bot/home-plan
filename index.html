<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Our Home — Design &amp; Walkthrough</title>
<style>
  :root{--ink:#102a3a;--line:#9fb3c0;--paper:#eef2f5;--accent:#1b6ec2}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  .app{display:flex;flex-direction:column;height:100dvh;background:var(--paper);
    font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;color:var(--ink)}
  nav{flex:none;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    padding:8px 14px;background:#fff;border-bottom:1px solid var(--line)}
  .brand{font-size:13px;letter-spacing:.14em;text-transform:uppercase;margin-right:auto;font-weight:600}
  button{font:inherit;font-size:12px;letter-spacing:.04em;cursor:pointer;
    padding:8px 14px;border-radius:10px;border:1px solid var(--line);background:#fff;color:var(--ink);transition:.14s}
  button:hover{border-color:var(--accent)}
  button.active{background:var(--accent);border-color:var(--accent);color:#fff}
  iframe{flex:1;width:100%;border:0;display:block}
</style>
</head>
<body>
<div class="app">
  <nav>
    <span class="brand">Our Home</span>
    <button data-view="3d">3D Walkthrough</button>
    <button data-view="design">Design Board</button>
  </nav>
  <iframe id="frame" title="view"></iframe>
</div>
<script>
  const views = {
    "3d":     "home-3d-model.html",
    "design": "home-design-board.html"
  };
  const frame = document.getElementById("frame");
  const buttons = [...document.querySelectorAll("button[data-view]")];

  function show(view){
    if(!views[view]) view = "3d";
    frame.src = views[view];
    buttons.forEach(b => b.classList.toggle("active", b.dataset.view === view));
    if(location.hash.slice(1) !== view) history.replaceState(null, "", "#" + view);
  }

  buttons.forEach(b => b.addEventListener("click", () => show(b.dataset.view)));
  window.addEventListener("hashchange", () => show(location.hash.slice(1)));
  show(location.hash.slice(1) || "3d");
</script>
</body>
</html>
